name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --locked --all-groups

      - name: Check lockfile
        run: uv lock --check

      - name: Lint
        run: uv run --locked --no-sync ruff check .

      - name: Format check
        run: uv run --locked --no-sync ruff format --check .

      - name: Type check
        run: uv run --locked --no-sync ty check

      - name: Test
        run: uv run --locked --no-sync pytest

      - name: Audit dependencies
        run: uv audit --locked --ignore-until-fixed GHSA-rrmf-rvhw-rf47
